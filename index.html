
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Treino Semanal</title>
<style>
body{font-family:Arial;background:#0a0a0a;color:white;padding:20px}
h2{margin-top:40px}
.card{background:#151515;border-radius:12px;padding:15px;margin-bottom:15px}
.exercise{display:flex;align-items:center;margin:8px 0}
.exercise input{margin-right:10px;transform:scale(1.3)}
.done{text-decoration:line-through;color:#7bd389}
</style>
</head>
<body>
<h1>Treino Semanal Ajustado</h1>
<h2>Terça — Peito + Tríceps</h2><div class='card'>
        <label class='exercise'>
        <input type='checkbox' onchange='toggleDone(this)'>
        <span>Supino inclinado máquina — 4x10-12</span>
        </label>
        
        <label class='exercise'>
        <input type='checkbox' onchange='toggleDone(this)'>
        <span>Supino inclinado halter — 4x10-12</span>
        </label>
        
        <label class='exercise'>
        <input type='checkbox' onchange='toggleDone(this)'>
        <span>Crucifixo máquina — 4x12</span>
        </label>
        
        <label class='exercise'>
        <input type='checkbox' onchange='toggleDone(this)'>
        <span>Tríceps corda no pulley — 4x12</span>
        </label>
        
        <label class='exercise'>
        <input type='checkbox' onchange='toggleDone(this)'>
        <span>Tríceps francês corda — 4x12</span>
        </label>
        
        <label class='exercise'>
        <input type='checkbox' onchange='toggleDone(this)'>
        <span>Coice na corda isolado — 4x12</span>
        </label>
        </div><h2>Quarta — Costas + Bíceps</h2><div class='card'>
        <label class='exercise'>
        <input type='checkbox' onchange='toggleDone(this)'>
        <span>Puxada frontal aberta — 4x10-12</span>
        </label>
        
        <label class='exercise'>
        <input type='checkbox' onchange='toggleDone(this)'>
        <span>Remada baixa triângulo — 4x10-12</span>
        </label>
        
        <label class='exercise'>
        <input type='checkbox' onchange='toggleDone(this)'>
        <span>Puxada em pé com corda — 3x12</span>
        </label>
        
        <label class='exercise'>
        <input type='checkbox' onchange='toggleDone(this)'>
        <span>Crucifixo inverso — 3x12</span>
        </label>
        
        <label class='exercise'>
        <input type='checkbox' onchange='toggleDone(this)'>
        <span>Scott — 4x10-12</span>
        </label>
        
        <label class='exercise'>
        <input type='checkbox' onchange='toggleDone(this)'>
        <span>Rosca unilateral halter — 3x10-12</span>
        </label>
        
        <label class='exercise'>
        <input type='checkbox' onchange='toggleDone(this)'>
        <span>Polia baixa corda — 3x12</span>
        </label>
        </div><h2>Quinta — Perna + Ombro + Trapézio</h2><div class='card'>
        <label class='exercise'>
        <input type='checkbox' onchange='toggleDone(this)'>
        <span>Leg press — 4x10-12</span>
        </label>
        
        <label class='exercise'>
        <input type='checkbox' onchange='toggleDone(this)'>
        <span>Cadeira extensora — 3x12-15</span>
        </label>
        
        <label class='exercise'>
        <input type='checkbox' onchange='toggleDone(this)'>
        <span>Cadeira flexora — 3x12-15</span>
        </label>
        
        <label class='exercise'>
        <input type='checkbox' onchange='toggleDone(this)'>
        <span>Adutor — 3x15</span>
        </label>
        
        <label class='exercise'>
        <input type='checkbox' onchange='toggleDone(this)'>
        <span>Abdutor — 3x15</span>
        </label>
        
        <label class='exercise'>
        <input type='checkbox' onchange='toggleDone(this)'>
        <span>Panturrilha em pé — 4x15-20</span>
        </label>
        
        <label class='exercise'>
        <input type='checkbox' onchange='toggleDone(this)'>
        <span>Desenvolvimento máquina — 4x10-12</span>
        </label>
        
        <label class='exercise'>
        <input type='checkbox' onchange='toggleDone(this)'>
        <span>Elevação lateral — 4x12</span>
        </label>
        
        <label class='exercise'>
        <input type='checkbox' onchange='toggleDone(this)'>
        <span>Remada alta máquina — 3x12</span>
        </label>
        
        <label class='exercise'>
        <input type='checkbox' onchange='toggleDone(this)'>
        <span>Encolhimento máquina — 4x12-15</span>
        </label>
        </div><h2>Sábado — Peito + Tríceps</h2><div class='card'>
        <label class='exercise'>
        <input type='checkbox' onchange='toggleDone(this)'>
        <span>Supino máquina reto — 4x10-12</span>
        </label>
        
        <label class='exercise'>
        <input type='checkbox' onchange='toggleDone(this)'>
        <span>Supino inclinado halter — 4x10-12</span>
        </label>
        
        <label class='exercise'>
        <input type='checkbox' onchange='toggleDone(this)'>
        <span>Crucifixo máquina — 4x12</span>
        </label>
        
        <label class='exercise'>
        <input type='checkbox' onchange='toggleDone(this)'>
        <span>Tríceps corda no pulley — 4x12</span>
        </label>
        
        <label class='exercise'>
        <input type='checkbox' onchange='toggleDone(this)'>
        <span>Tríceps francês corda — 4x12</span>
        </label>
        
        <label class='exercise'>
        <input type='checkbox' onchange='toggleDone(this)'>
        <span>Tríceps banco / mergulho — 4x12</span>
        </label>
        </div><h2>Domingo — Costas + Bíceps</h2><div class='card'>
        <label class='exercise'>
        <input type='checkbox' onchange='toggleDone(this)'>
        <span>Puxada frontal aberta — 4x10-12</span>
        </label>
        
        <label class='exercise'>
        <input type='checkbox' onchange='toggleDone(this)'>
        <span>Remada baixa triângulo — 4x10-12</span>
        </label>
        
        <label class='exercise'>
        <input type='checkbox' onchange='toggleDone(this)'>
        <span>Puxada em pé com corda — 3x12</span>
        </label>
        
        <label class='exercise'>
        <input type='checkbox' onchange='toggleDone(this)'>
        <span>Crucifixo inverso — 3x12</span>
        </label>
        
        <label class='exercise'>
        <input type='checkbox' onchange='toggleDone(this)'>
        <span>Scott — 4x10-12</span>
        </label>
        
        <label class='exercise'>
        <input type='checkbox' onchange='toggleDone(this)'>
        <span>Rosca unilateral halter — 3x10-12</span>
        </label>
        
        <label class='exercise'>
        <input type='checkbox' onchange='toggleDone(this)'>
        <span>Polia baixa corda — 3x12</span>
        </label>
        </div>
<script>
function toggleDone(el){
  if(el.checked){
    el.nextElementSibling.classList.add("done")
  }else{
    el.nextElementSibling.classList.remove("done")
  }
}
</script>
</body>
</html>
