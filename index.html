
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Treino Semanal Pro</title>

<style>
body{
font-family:Arial;
background:#000;
color:#fff;
padding:20px;
}

.card{
background:#111;
padding:15px;
border-radius:12px;
margin-bottom:20px;
}

h1{
font-size:32px;
}

h2{
margin-top:30px;
}

label{
display:block;
padding:8px 0;
font-size:18px;
}
</style>
</head>

<body>

<h1>Treino Semanal Pro</h1>

<h2>Terça — Peito + Tríceps</h2>

<div class="card">
<label><input type="checkbox"> Supino inclinado máquina — 4x10-12</label>
<label><input type="checkbox"> Supino inclinado halter — 4x10-12</label>
<label><input type="checkbox"> Crucifixo máquina — 4x12</label>
<label><input type="checkbox"> Tríceps corda pulley — 4x12</label>
<label><input type="checkbox"> Tríceps francês corda — 4x12</label>
<label><input type="checkbox"> Coice corda isolado — 4x12</label>
</div>

<h2>Quarta — Costas + Bíceps</h2>

<div class="card">
<label><input type="checkbox"> Puxada frontal aberta — 4x10-12</label>
<label><input type="checkbox"> Remada baixa triângulo — 4x10-12</label>
<label><input type="checkbox"> Puxada em pé corda — 3x12</label>
<label><input type="checkbox"> Crucifixo inverso — 3x12</label>
<label><input type="checkbox"> Scott — 4x10-12</label>
<label><input type="checkbox"> Rosca unilateral halter — 3x10-12</label>
</div>

<h2>Quinta — Perna</h2>

<div class="card">
<label><input type="checkbox"> Leg press — 4x15</label>
<label><input type="checkbox"> Extensora — 4x15</label>
<label><input type="checkbox"> Flexora — 4x15</label>
<label><input type="checkbox"> Adutor — 4x15</label>
<label><input type="checkbox"> Abdutor — 4x15</label>
<label><input type="checkbox"> Panturrilha — 4x15</label>
</div>

</body>
</html>
