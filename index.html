<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Treino Semanal</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">
<style>
body{font-family:Arial;background:#0b0b0b;color:white;padding:16px}
.card{background:#121212;padding:16px;border-radius:16px;margin-bottom:16px}
.exercise{background:#0f2b16;padding:14px;border-radius:14px;margin-top:10px}
button{padding:10px;border-radius:8px;border:none;margin:4px}
.series{background:#1f1f1f;color:white}
.series.done{background:#22c55e;color:black}
</style>
</head>
<body>

<h1>Treino Semanal</h1>

<div class="card">
<h2 id="workoutTitle"></h2>
<div id="exerciseList"></div>
<button onclick="finishWorkout()">Concluir treino</button>
</div>

<script>
const WORKOUTS = [
{id:"A", title:"Treino A — Peito + Tríceps", exercises:["Supino inclinado","Supino reto","Crucifixo"]},
{id:"B", title:"Treino B — Costas + Bíceps", exercises:["Puxada frente","Remada","Rosca direta"]},
{id:"C", title:"Treino C — Pernas", exercises:["Agachamento","Leg press","Panturrilha"]}
];

let state = JSON.parse(localStorage.getItem("treino_seq")) || {lastCompleted:null};

function getNextWorkout(){
 if(!state.lastCompleted) return WORKOUTS[0];
 let index = WORKOUTS.findIndex(w=>w.id===state.lastCompleted);
 return WORKOUTS[(index+1)%WORKOUTS.length];
}

function renderWorkout(){
 const w = getNextWorkout();
 document.getElementById("workoutTitle").innerText = w.title;
 const list = document.getElementById("exerciseList");
 list.innerHTML="";
 w.exercises.forEach(ex=>{
   const div=document.createElement("div");
   div.className="exercise";
   div.innerHTML="<b>"+ex+"</b><br>";
   for(let s=1;s<=4;s++){
     const btn=document.createElement("button");
     btn.innerText=s;
     btn.className="series";
     btn.onclick=()=>btn.classList.toggle("done");
     div.appendChild(btn);
   }
   list.appendChild(div);
 });
}

function finishWorkout(){
 const w = getNextWorkout();
 state.lastCompleted = w.id;
 localStorage.setItem("treino_seq",JSON.stringify(state));
 renderWorkout();
}

renderWorkout();
</script>

</body>
</html>
