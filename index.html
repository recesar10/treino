<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Treino Pro</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f2f2f2;
            text-align: center;
            padding: 40px;
        }
        h1 {
            color: #2c3e50;
        }
        .card {
            background: white;
            padding: 20px;
            margin: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        button {
            background: #27ae60;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <h1>Treino Pro</h1>

    <div class="card">
        <h2>Treino de Hoje</h2>
        <p>Supino - 3x10</p>
        <p>Agachamento - 3x10</p>
        <p>Abdominal - 3x15</p>
        <button>Concluir Treino</button>
    </div>

</body>
</html>
