<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Treino em Sequência Pro</title>
<meta name="theme-color" content="#050505">
<link rel="manifest" href="manifest.json">
<style>
    :root {
        --bg-dark: #000000;
        --panel: #121212;
        --panel-light: #1c1c1c;
        --accent: #d8b15b; /* Seu Dourado Original */
        --text-bright: #ffffff;
        --text-dim: #a0a0a0;
        --success: #20c05c;
        --danger: #d84040;
        --shadow: 0 10px 30px rgba(0,0,0,0.6);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: var(--bg-dark);
        color: var(--text-bright);
        line-height: 1.5;
    }

    .wrap {
        max-width: 600px;
        margin: 0 auto;
        padding: 20px 15px 100px;
    }

    /* --- Header & Progresso --- */
    header { padding: 20px 0; }
    header h1 { font-size: 28px; margin: 0; font-weight: 800; letter-spacing: -1px; }
    header p { color: var(--accent); margin: 5px 0; font-size: 14px; font-weight: 600; text-transform: uppercase; }

    .progress-container {
        height: 6px;
        background: #222;
        border-radius: 10px;
        margin: 15px 0 25px;
        overflow: hidden;
    }
    .progress-fill {
        height: 100%;
        background: var(--accent);
        width: 0%;
        transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 0 10px var(--accent);
    }

    /* --- Card de Motivação (Horóscopo) --- */
    .hero-card {
        background: linear-gradient(145deg, #161616, #0a0a0a);
        border-radius: 20px;
        padding: 25px;
        margin-bottom: 25px;
        border: 1px solid rgba(216, 177, 91, 0.2);
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        box-shadow: var(--shadow);
    }

    .hero-card img {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        border: 3px solid var(--accent);
        margin-bottom: 15px;
        object-fit: cover;
    }

    .motivation-msg {
        font-style: italic;
        font-size: 16px;
        color: var(--text-dim);
        line-height: 1.4;
    }

    /* --- Lista de Exercícios --- */
    .exercise-card {
        background: var(--panel);
        border-radius: 18px;
        padding: 20px;
        margin-bottom: 18px;
        border: 1px solid rgba(255,255,255,0.05);
        transition: transform 0.2s;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 15px;
    }

    .exercise-title { font-size: 18px; font-weight: 700; color: var(--text-bright); }
    
    .weight-ctrl {
        display: flex;
        align-items: center;
        background: var(--panel-light);
        padding: 5px 12px;
        border-radius: 10px;
        border: 1px solid #333;
    }

    .weight-input {
        background: transparent;
        border: none;
        color: var(--accent);
        font-size: 16px;
        font-weight: 800;
        width: 60px;
        text-align: center;
        outline: none;
    }

    .series-grid {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
    }

    .series-box {
        width: 50px;
        height: 50px;
        background: rgba(255,255,255,0.03);
        border: 2px solid #333;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 800;
        font-size: 16px;
        cursor: pointer;
        transition: all 0.2s;
    }

    .series-box.done {
        background: var(--accent);
        border-color: var(--accent);
        color: #000;
        transform: scale(0.92);
    }

    /* --- Timer de Descanso --- */
    .timer-overlay {
        position: fixed;
        top: 20px;
        right: 20px;
        background: var(--accent);
        color: #000;
        padding: 10px 20px;
        border-radius: 30px;
        font-weight: 900;
        font-size: 18px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        z-index: 1000;
        display: none;
    }

    /* --- Botão Finalizar --- */
    .footer-actions {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: linear-gradient(0deg, #000 70%, transparent);
        padding: 20px;
        display: flex;
        justify-content: center;
        z-index: 900;
    }

    .btn-finish {
        background: var(--accent);
        color: #000;
        border: none;
        width: 100%;
        max-width: 500px;
        padding: 18px;
        border-radius: 16px;
        font-size: 16px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 1px;
        box-shadow: 0 8px 20px rgba(216, 177, 91, 0.3);
    }

    /* Esconde o que não é necessário agora */
    .hidden { display: none !important; }
</style>
</head>
<body>

<div id="timer-display" class="timer-overlay">00:00</div>

<div class="wrap">
    <header>
        <p id="workout-day-label">Carregando treino...</p>
        <h1 id="current-workout-name">---</h1>
        <div class="progress-container">
            <div class="progress-fill" id="pb-fill"></div>
        </div>
    </header>

    <div class="hero-card" id="motivation-section">
        <img id="animal-img" src="animal_tigre.png" alt="Animal do Dia">
        <div class="motivation-msg" id="motivation-text">
            "A persistência é o caminho do êxito."
        </div>
    </div>

    <div id="exercise-list">
        </div>
</div>

<div class="footer-actions">
    <button class="btn-finish" id="btn-finalizar">Finalizar Treino</button>
</div>

<script>
/* ==========================================================================
   LÓGICA DO APP (PRESERVADA E OTIMIZADA DO ORIGINAL)
   ==========================================================================
*/

const FRASES = [
    "A força não vem da capacidade física, vem de uma vontade indomável.",
    "O seu único limite é você mesmo.",
    "Cada gota de suor é um passo em direção ao topo.",
    "O sucesso é a soma de pequenos esforços repetidos dia após dia.",
    "Não pare quando estiver cansado, pare quando tiver terminado.",
    "A disciplina é a ponte entre metas e realizações.",
    "Seja mais forte que sua melhor desculpa.",
    "Treine enquanto eles dormem, estude enquanto eles se divertem.",
    "O corpo alcança o que a mente acredita.",
    "Não é sobre ser o melhor, é sobre ser melhor do que ontem.",
    // ... (Aqui você deve manter todas as suas 60 frases originais)
];

const ANIMAIS = [
    {n:"Tigre", i:"animal_tigre.png"},
    {n:"Dragão", i:"animal_dragao.png"},
    {n:"Serpente", i:"animal_serpente.png"},
    {n:"Macaco", i:"animal_macaco.png"},
    {n:"Porco", i:"animal_porco.png"},
    {n:"Rato", i:"animal_rato.png"},
    {n:"Boi", i:"animal_boi.png"},
    {n:"Coelho", i:"animal_coelho.png"},
    {n:"Cavalo", i:"animal_cavalo.png"},
    {n:"Cabra", i:"animal_cabra.png"},
    {n:"Galo", i:"animal_galo.png"},
    {n:"Cão", i:"animal_cao.png"}
];

// Dados dos Treinos (Original)
const treinos = {
    "Segunda": {
        nome: "Peito e Tríceps",
        exercicios: [
            {id: "s1", n: "Supino Reto", s: 4, r: 60},
            {id: "s2", n: "Supino Inclinado", s: 3, r: 60},
            {id: "s3", n: "Tríceps Corda", s: 4, r: 45}
        ]
    }
    // ... Adicione os outros dias aqui como no seu original
};

// Funções de Inicialização
function initApp() {
    const hoje = new Date();
    const diaSemana = ["Domingo","Segunda","Terça","Quarta","Quinta","Sexta","Sábado"][hoje.getDay()];
    const diaMes = hoje.getDate();
    
    // Define Animal e Frase do Dia (Baseado no dia do mês)
    const animalIdx = diaMes % ANIMAIS.length;
    const fraseIdx = (diaMes * 7) % FRASES.length;
    
    document.getElementById('animal-img').src = ANIMAIS[animalIdx].i;
    document.getElementById('motivation-text').innerText = FRASES[fraseIdx];
    document.getElementById('workout-day-label').innerText = "Treino de " + diaSemana;
    
    renderWorkout(treinos[diaSemana] || treinos["Segunda"]);
}

function renderWorkout(treino) {
    document.getElementById('current-workout-name').innerText = treino.nome;
    const list = document.getElementById('exercise-list');
    list.innerHTML = "";
    
    treino.exercicios.forEach(ex => {
        const div = document.createElement('div');
        div.className = 'exercise-card';
        div.innerHTML = `
            <div class="exercise-header">
                <span class="exercise-title">${ex.n}</span>
                <div class="weight-ctrl">
                    <input type="text" class="weight-input" value="0kg" data-id="${ex.id}">
                </div>
            </div>
            <div class="series-grid" id="grid-${ex.id}"></div>
        `;
        list.appendChild(div);
        
        const grid = document.getElementById(`grid-${ex.id}`);
        for(let i=1; i<=ex.s; i++) {
            const box = document.createElement('div');
            box.className = 'series-box';
            box.innerText = i;
            box.onclick = function() {
                this.classList.toggle('done');
                updateProgress();
                if(this.classList.contains('done')) startTimer(ex.r);
            };
            grid.appendChild(box);
        }
    });
}

function updateProgress() {
    const total = document.querySelectorAll('.series-box').length;
    const done = document.querySelectorAll('.series-box.done').length;
    const perc = total > 0 ? (done / total) * 100 : 0;
    document.getElementById('pb-fill').style.width = perc + "%";
}

let timerInterval;
function startTimer(seconds) {
    clearInterval(timerInterval);
    const display = document.getElementById('timer-display');
    display.style.display = 'block';
    let timeLeft = seconds;
    
    timerInterval = setInterval(() => {
        const mins = Math.floor(timeLeft / 60);
        const secs = timeLeft % 60;
        display.innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        
        if (timeLeft <= 0) {
            clearInterval(timerInterval);
            display.style.display = 'none';
            // Alerta sonoro ou vibração aqui se desejar
        }
        timeLeft--;
    }, 1000);
}

// Inicia
initApp();

// Registro do Service Worker
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(err => console.log("Erro SW:", err));
}
</script>
</body>
</html>
