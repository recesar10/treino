<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Treino Semanal Séries</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #000;
  color: #fff;
}

.container {
  padding: 20px;
}

h1 {
  font-size: 28px;
  margin-bottom: 10px;
}

.subtitle {
  color: #aaa;
  margin-bottom: 20px;
}

.card {
  position: relative;
  border-radius: 20px;
  padding: 20px;
  overflow: hidden;
  border: 1px solid rgba(255, 200, 100, 0.3);
  background: #111;
}

/* FUNDO DO ANIMAL */
.proverb-bg {
  position: absolute;
  inset: 0;
  background-size: contain;
  background-position: right center;
  background-repeat: no-repeat;
  opacity: 0.25;
}

/* SOBREPOSIÇÃO */
.overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(
    90deg,
    rgba(0,0,0,0.95) 0%,
    rgba(0,0,0,0.85) 40%,
    rgba(0,0,0,0.3) 70%,
    rgba(0,0,0,0.1) 100%
  );
}

.content {
  position: relative;
  z-index: 2;
}

.tag {
  display: inline-block;
  padding: 5px 10px;
  border-radius: 12px;
  background: rgba(255,255,255,0.1);
  font-size: 12px;
  margin-bottom: 10px;
}

.quote {
  font-size: 24px;
  font-weight: bold;
  line-height: 1.3;
  margin-bottom: 10px;
}

.animal {
  color: #ccc;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="container">

  <h1>Treino Semanal Séries</h1>
  <div class="subtitle">
    Agora com provérbio do dia e artes dos 12 animais do horóscopo chinês.
  </div>

  <div class="card">
    <div class="proverb-bg" id="bg"></div>
    <div class="overlay"></div>

    <div class="content">
      <div class="tag">Sabedoria oriental</div>
      <div class="quote" id="frase"></div>
      <div class="animal" id="animal"></div>
    </div>
  </div>

</div>

<script>
const frases = [
"Nem todo silêncio é vazio; às vezes, é compreensão.",
"A jornada mais longa começa com o primeiro passo.",
"A paciência é amarga, mas seu fruto é doce.",
"A água mole vence a pedra dura.",
"Quem domina a si mesmo é mais forte.",
"A pressa é inimiga da perfeição.",
"O sábio aprende mais com o silêncio.",
"A persistência realiza o impossível.",
"O equilíbrio é a chave da vida.",
"A humildade abre portas fechadas.",
"A mente tranquila vê mais longe.",
"A disciplina constrói o sucesso."
];

const animais = [
"dragao","tigre","coelho","cavalo",
"cabra","serpente","macaco","galo",
"boi","porco","rato","cao"
];

const nomes = {
dragao:"Dragão",
tigre:"Tigre",
coelho:"Coelho",
cavalo:"Cavalo",
cabra:"Cabra",
serpente:"Serpente",
macaco:"Macaco",
galo:"Galo",
boi:"Boi",
porco:"Porco",
rato:"Rato",
cao:"Cão"
};

const dia = new Date().getDate();

const frase = frases[dia % frases.length];
const animal = animais[dia % animais.length];

document.getElementById("frase").innerText = frase;
document.getElementById("animal").innerText = "Animal do dia: " + nomes[animal];

document.getElementById("bg").style.backgroundImage =
  `url('animal_${animal}.png')`;
</script>

</body>
</html>
