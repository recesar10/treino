<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Treino Semanal Pro</title>
<style>
body{font-family:Arial;background:#000;color:#fff;padding:20px}
h1{font-size:30px}
h2{margin-top:30px}
.card{background:#111;border-radius:12px;padding:15px;margin-bottom:15px}
label{display:block;margin:6px 0;font-size:18px}
</style>
</head>
<body>

<h1>Treino Semanal Pro</h1>

<h2>Terça — Peito + Tríceps</h2>
<div class="card">
<label><input type="checkbox"> Supino inclinado máquina — 4x10</label>
<label><input type="checkbox"> Supino inclinado halter — 4x10</label>
<label><input type="checkbox"> Crucifixo máquina — 4x12</label>
<label><input type="checkbox"> Tríceps corda pulley — 4x12</label>
<label><input type="checkbox"> Tríceps francês corda — 4x12</label>
<label><input type="checkbox"> Coice corda — 4x12</label>
</div>

<h2>Quarta — Costas + Bíceps</h2>
<div class="card">
<label><input type="checkbox"> Puxada frontal aberta — 4x10</label>
<label><input type="checkbox"> Remada baixa triângulo — 4x10</label>
<label><input type="checkbox"> Puxada em pé corda — 3x12</label>
<label><input type="checkbox"> Crucifixo inverso — 3x12</label>
<label><input type="checkbox"> Scott — 4x10</label>
<label><input type="checkbox"> Rosca unilateral halter — 3x10</label>
<label><input type="checkbox"> Polia baixa corda — 3x12</label>
</div>

<h2>Quinta — Perna + Ombro + Trapézio</h2>
<div class="card">
<label><input type="checkbox"> Leg press — 4x12</label>
<label><input type="checkbox"> Extensora — 3x15</label>
<label><input type="checkbox"> Flexora — 3x15</label>
<label><input type="checkbox"> Adutor — 3x15</label>
<label><input type="checkbox"> Abdutor — 3x15</label>
<label><input type="checkbox"> Panturrilha — 4x15‑20</label>
<label><input type="checkbox"> Desenvolvimento máquina — 4x10</label>
<label><input type="checkbox"> Remada alta máquina — 3x12</label>
<label><input type="checkbox"> Encolhimento trapézio — 4x12‑15</label>
</div>

<h2>Sábado — Peito + Tríceps</h2>
<div class="card">
<label><input type="checkbox"> Supino máquina reto — 4x10</label>
<label><input type="checkbox"> Supino inclinado halter — 4x10</label>
<label><input type="checkbox"> Crucifixo máquina — 4x12</label>
<label><input type="checkbox"> Tríceps corda — 4x12</label>
<label><input type="checkbox"> Francês corda — 4x12</label>
</div>

<h2>Domingo — Costas + Bíceps</h2>
<div class="card">
<label><input type="checkbox"> Puxada frontal aberta — 4x10</label>
<label><input type="checkbox"> Remada baixa triângulo — 4x10</label>
<label><input type="checkbox"> Crucifixo inverso — 3x12</label>
<label><input type="checkbox"> Scott — 4x10</label>
<label><input type="checkbox"> Rosca halter — 3x10</label>
</div>

</html>
